id: maryam-ops
name: "maryam-ops"
description: "Business Ops & Finance Manager for the Zeoel AI Agency. Logistics, billing, and supply chain specialist."
version: "1.0.0"
role: "Business Ops & Finance Manager"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/customer-billing-ops/SKILL.md
  - ../../skills/finance-billing-ops/SKILL.md
  - ../../skills/inventory-demand-planning/SKILL.md
  - ../../skills/logistics-exception-management/SKILL.md
  - ../../skills/customs-trade-compliance/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - general

quality_gates: []

output:
  format: markdown
  include_tests: false
