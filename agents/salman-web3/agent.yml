id: salman-web3
name: "salman-web3"
description: "Web3 & Crypto Engineer for the Zeoel AI Agency. Smart contract security and blockchain integration specialist."
version: "1.0.0"
role: "Web3 & Crypto Engineer"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/defi-amm-security/SKILL.md
  - ../../skills/evm-token-decimals/SKILL.md
  - ../../skills/nodejs-keccak256/SKILL.md
  - ../../skills/llm-trading-agent-security/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - general

quality_gates: []

output:
  format: markdown
  include_tests: false
