id: sajjad-debugger
name: "sajjad-debugger"
description: "Debugging & Performance Specialist for the Zeoel AI Agency. Systematic root cause analysis, performance profiling, and architectural review."
version: "1.0.0"
role: "Debugger & Performance Specialist"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/systematic-debugging/SKILL.md
  - ../../skills/agent-introspection-debugging/SKILL.md
  - ../../skills/error-handling/SKILL.md
  - ../../skills/verification-loop/SKILL.md
  - ../../skills/browser-qa/SKILL.md
  - ../../skills/production-audit/SKILL.md
  - ../../skills/benchmark/SKILL.md
  - ../../skills/postgres-patterns/SKILL.md
  - ../../skills/redis-patterns/SKILL.md
  - ../../skills/plankton-code-quality/SKILL.md
  - ../../skills/coding-standards/SKILL.md
  - ../../skills/security-scan/SKILL.md
  - ../../skills/best-practice/SKILL.md
  - ../../skills/architecture-decision-records/SKILL.md
  - ../../skills/laravel-verification/SKILL.md
  - ../../skills/laravel-tdd/SKILL.md
  - ../../skills/webapp-testing/SKILL.md
  - ../../skills/e2e-testing/SKILL.md
  - ../../skills/flutter-dart-code-review/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - general

quality_gates: []

output:
  format: markdown
  include_tests: false
