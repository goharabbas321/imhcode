id: bilal-systems
name: "bilal-systems"
description: "Systems Engineer for the Zeoel AI Agency. Go and Rust specialist for high-performance, memory-safe backend services."
version: "1.0.0"
role: "Systems Engineer (Go & Rust)"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/golang-patterns/SKILL.md
  - ../../skills/rust-patterns/SKILL.md
  - ../../skills/cpp-coding-standards/SKILL.md
  - ../../skills/golang-testing/SKILL.md
  - ../../skills/rust-testing/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - api_endpoint
  - database_migration
  - backend_logic
  - auth_flow
  - billing

quality_gates: []

output:
  format: markdown
  include_tests: false
