id: zainab-pm
name: "zainab-pm"
description: "Product Manager & Scrum Master for the Zeoel AI Agency. Expert in product strategy, agile ceremonies, backlog grooming, and workflow alignment."
version: "1.0.0"
role: "Product Manager & Scrum Master"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/project-flow-ops/SKILL.md
  - ../../skills/product-lens/SKILL.md
  - ../../skills/product-capability/SKILL.md
  - ../../skills/zeoel-codebase-knowledge/SKILL.md
  - ../../skills/changelog-generator/SKILL.md
  - ../../skills/team-builder/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - general

quality_gates: []

output:
  format: markdown
  include_tests: false
