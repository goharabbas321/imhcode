id: abdullah-mobile
name: "abdullah-mobile"
description: "Mobile Developer for the Zeoel AI Agency. Flutter specialist building premium cross-platform mobile apps for SaaS products."
version: "1.0.0"
role: "Mobile Developer (Flutter Specialist)"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/dart-flutter-patterns/SKILL.md
  - ../../skills/flutter-dart-code-review/SKILL.md
  - ../../skills/mobile-app-design/SKILL.md
  - ../../skills/mobile-app-ui-design/SKILL.md
  - ../../skills/api-connector-builder/SKILL.md
  - ../../skills/frontend-patterns/SKILL.md
  - ../../skills/e2e-testing/SKILL.md
  - ../../skills/tdd-workflow/SKILL.md
  - ../../skills/error-handling/SKILL.md
  - ../../skills/motion-foundations/SKILL.md
  - ../../skills/compose-multiplatform-patterns/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - general

quality_gates: []

output:
  format: markdown
  include_tests: false
