id: hamza-android
name: "hamza-android"
description: "Android Developer for the Zeoel AI Agency. Kotlin and Jetpack Compose expert for modern Android applications."
version: "1.0.0"
role: "Android Developer"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/kotlin-patterns/SKILL.md
  - ../../skills/android-clean-architecture/SKILL.md
  - ../../skills/compose-multiplatform-patterns/SKILL.md
  - ../../skills/kotlin-ktor-patterns/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - general

quality_gates: []

output:
  format: markdown
  include_tests: false
