id: baqir-docs
name: "baqir-docs"
description: "Documentation & API Specialist for the Zeoel AI Agency. Technical writer, API documenter, and DX optimizer."
version: "1.0.0"
role: "Documentation & API Specialist"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/zeoel-codebase-knowledge/SKILL.md
  - ../../skills/codebase-onboarding/SKILL.md
  - ../../skills/coding-standards/SKILL.md
  - ../../skills/architecture-decision-records/SKILL.md
  - ../../skills/article-writing/SKILL.md
  - ../../skills/content-engine/SKILL.md
  - ../../skills/changelog-generator/SKILL.md
  - ../../skills/documentation-lookup/SKILL.md
  - ../../skills/api-design/SKILL.md
  - ../../skills/api-connector-builder/SKILL.md
  - ../../skills/repo-scan/SKILL.md
  - ../../skills/brand-voice/SKILL.md
  - ../../skills/product-capability/SKILL.md
  - ../../skills/product-lens/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - general

quality_gates: []

output:
  format: markdown
  include_tests: false
