id: yusuf-java
name: "yusuf-java"
description: "Enterprise Java Engineer for the Zeoel AI Agency. Spring Boot and Quarkus specialist for massive-scale enterprise backends."
version: "1.0.0"
role: "Enterprise Java Engineer"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/springboot-patterns/SKILL.md
  - ../../skills/springboot-security/SKILL.md
  - ../../skills/springboot-tdd/SKILL.md
  - ../../skills/quarkus-patterns/SKILL.md
  - ../../skills/java-coding-standards/SKILL.md
  - ../../skills/jpa-patterns/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - api_endpoint
  - database_migration
  - backend_logic
  - auth_flow
  - billing

quality_gates: []

output:
  format: markdown
  include_tests: false
