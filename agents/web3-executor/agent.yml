id: web3-executor
name: "Web3 Executor"
description: "build smart contracts, DeFi protocols, and blockchain applications using Solidity, Hardhat, and Ethers.js."
version: "1.0.0"
role: "Web3 / Smart Contract Executor"

system_prompt: "./SYSTEM.md"

# Core skills are ALWAYS loaded (keep lean — 3-6 skills max)
# Extended skills are loaded on-demand by task keyword matching
skills:
  - ../../skills/defi-amm-security/SKILL.md
  - ../../skills/trailofbits-auditing/SKILL.md
  - ../../skills/error-handling/SKILL.md

preferred_engines:
  - opencode
  - codex
  - claude

fallback_engines:
  - claude

default_model: deepseek-v4-pro

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - imhdb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - backend/**
  writable:
    - docs/**/*.md
    - backend/**

supported_task_types:
  - smart_contract
  - defi
  - nft
  - token
  - dao

quality_gates: []

output:
  format: markdown
  include_tests: false
