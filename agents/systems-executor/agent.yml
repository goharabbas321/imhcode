id: systems-executor
name: "Systems Executor"
description: "build high-performance systems code using Go, Rust, or C++ with focus on concurrency, memory safety, and performance."
version: "1.0.0"
role: "Systems Programming Executor (Go / Rust / C++)"

system_prompt: "./SYSTEM.md"

# Core skills are ALWAYS loaded (keep lean — 3-6 skills max)
# Extended skills are loaded on-demand by task keyword matching
skills:
  - ../../skills/golang-patterns/SKILL.md
  - ../../skills/error-handling/SKILL.md

preferred_engines:
  - opencode
  - codex
  - claude

fallback_engines:
  - claude

default_model: deepseek-v4-pro

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - imhdb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - backend/**
  writable:
    - docs/**/*.md
    - backend/**

supported_task_types:
  - systems
  - cli
  - microservice
  - performance
  - concurrency

quality_gates: []

output:
  format: markdown
  include_tests: false
