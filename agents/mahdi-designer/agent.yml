id: mahdi-designer
name: "mahdi-designer"
description: "Product Designer & UX Expert for the Zeoel AI Agency. Focuses on user delight, accessibility, SEO-first design, and intuitive SaaS flows."
version: "1.0.0"
role: "Product Designer & UX Expert (SEO-First Design)"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/frontend-design/SKILL.md
  - ../../skills/frontend-design-direction/SKILL.md
  - ../../skills/seo/SKILL.md
  - ../../skills/design-system/SKILL.md
  - ../../skills/design-auditor/SKILL.md
  - ../../skills/mobile-app-design/SKILL.md
  - ../../skills/mobile-app-ui-design/SKILL.md
  - ../../skills/make-interfaces-feel-better/SKILL.md
  - ../../skills/canvas-design/SKILL.md
  - ../../skills/brand-guidelines/SKILL.md
  - ../../skills/brand-voice/SKILL.md
  - ../../skills/nothing-design/SKILL.md
  - ../../skills/liquid-glass-design/SKILL.md
  - ../../skills/click-path-audit/SKILL.md
  - ../../skills/accessibility/SKILL.md
  - ../../skills/awwwards/SKILL.md
  - ../../skills/apple/SKILL.md
  - ../../skills/stripe/SKILL.md
  - ../../skills/vercel/SKILL.md
  - ../../skills/linear/SKILL.md
  - ../../skills/framer/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - ui_component
  - page_design
  - design_system
  - dark_mode
  - design_tokens
  - landing_page
  - styling

quality_gates: []

output:
  format: markdown
  include_tests: false
