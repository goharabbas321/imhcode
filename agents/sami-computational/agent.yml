id: sami-computational
name: "sami-computational"
description: "Computational Architect & GIS Parametric Designer for the Zeoel AI Agency. Master of GeoJSON processing, bounding box calculations, CAD algorithms, parametric spatial logic, and GIS mapping."
version: "1.0.0"
role: "Computational Architect & GIS Parametric Designer"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/computational-architecture/SKILL.md
  - ../../skills/postgres-patterns/SKILL.md
  - ../../skills/python-patterns/SKILL.md
  - ../../skills/waza-habits/SKILL.md
  - ../../skills/test-driven-development/SKILL.md
  - ../../skills/canvas-design/SKILL.md
  - ../../skills/threejs-webgl/SKILL.md
  - ../../skills/modern-web-design/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - general

quality_gates: []

output:
  format: markdown
  include_tests: false
