id: farhan-marketing
name: "farhan-marketing"
description: "Growth Hacker & Performance Marketing Specialist for the Zeoel AI Agency. Master of conversion rate optimization (CRO), high-persuasion copywriting (AIDA, PAS), dynamic geotargeted SEO, and growth funnel analytics."
version: "1.0.0"
role: "Growth Hacker & Performance Marketer"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/growth-marketing/SKILL.md
  - ../../skills/seo-growth/SKILL.md
  - ../../skills/seo/SKILL.md
  - ../../skills/waza-habits/SKILL.md
  - ../../skills/test-driven-development/SKILL.md
  - ../../skills/ui-ux-pro-max/SKILL.md
  - ../../skills/modern-web-design/SKILL.md
  - ../../skills/micro-interactions/SKILL.md
  - ../../skills/motion-design/SKILL.md
  - ../../skills/responsive-email-templates/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - seo_audit
  - content_strategy
  - marketing_funnel

quality_gates: []

output:
  format: markdown
  include_tests: false
