id: ibrahim-ai
name: "ibrahim-ai"
description: "AI & Agentic Systems Architect for the Zeoel AI Agency. Master of MCP servers, autonomous loops, and LLM orchestration."
version: "1.0.0"
role: "AI & Agentic Systems Architect"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/agentic-engineering/SKILL.md
  - ../../skills/agent-architecture-audit/SKILL.md
  - ../../skills/agent-eval/SKILL.md
  - ../../skills/continuous-agent-loop/SKILL.md
  - ../../skills/mcp-server-patterns/SKILL.md
  - ../../skills/openclaw-persona-forge/SKILL.md
  - ../../skills/prompt-optimizer/SKILL.md
  - ../../skills/eval-harness/SKILL.md
  - ../../skills/cost-aware-llm-pipeline/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - general

quality_gates: []

output:
  format: markdown
  include_tests: false
