id: abbas-python
name: "abbas-python"
description: "Python, Django & ML Engineer for the Zeoel AI Agency. Django, FastAPI, Celery, and ML pipelines expert for robust backend systems and automation."
version: "1.0.0"
role: "Python, Django & ML Engineer"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/python-patterns/SKILL.md
  - ../../skills/test-driven-development/SKILL.md
  - ../../skills/python-testing/SKILL.md
  - ../../skills/django-patterns/SKILL.md
  - ../../skills/django-celery/SKILL.md
  - ../../skills/mle-workflow/SKILL.md
  - ../../skills/fastapi-patterns/SKILL.md
  - ../../skills/django-security/SKILL.md
  - ../../skills/django-tdd/SKILL.md
  - ../../skills/pytorch-patterns/SKILL.md
  - ../../skills/data-scraper-agent/SKILL.md
  - ../../skills/automation-audit-ops/SKILL.md
  - ../../skills/benchmark/SKILL.md
  - ../../skills/deep-research/SKILL.md
  - ../../skills/cost-aware-llm-pipeline/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - api_endpoint
  - database_migration
  - backend_logic
  - auth_flow
  - billing

quality_gates: []

output:
  format: markdown
  include_tests: false
