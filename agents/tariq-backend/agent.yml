id: tariq-backend
name: "tariq-backend"
description: "Backend Engineer for the Zeoel AI Agency. Laravel & PostgreSQL specialist for SaaS projects with multi-tenancy and subscription billing."
version: "1.0.0"
role: "Backend Engineer (Laravel & PostgreSQL SaaS Specialist)"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/test-driven-development/SKILL.md
  - ../../skills/laravel-patterns/SKILL.md
  - ../../skills/laravel-security/SKILL.md
  - ../../skills/laravel-tdd/SKILL.md
  - ../../skills/laravel-verification/SKILL.md
  - ../../skills/laravel-plugin-discovery/SKILL.md
  - ../../skills/postgres-patterns/SKILL.md
  - ../../skills/mysql-patterns/SKILL.md
  - ../../skills/redis-patterns/SKILL.md
  - ../../skills/prisma-patterns/SKILL.md
  - ../../skills/api-design/SKILL.md
  - ../../skills/api-connector-builder/SKILL.md
  - ../../skills/database-migrations/SKILL.md
  - ../../skills/backend-patterns/SKILL.md
  - ../../skills/hexagonal-architecture/SKILL.md
  - ../../skills/nestjs-patterns/SKILL.md
  - ../../skills/docker-patterns/SKILL.md
  - ../../skills/security-review/SKILL.md
  - ../../skills/gateguard/SKILL.md
  - ../../skills/production-audit/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - api_endpoint
  - database_migration
  - backend_logic
  - auth_flow
  - billing

quality_gates: []

output:
  format: markdown
  include_tests: false
