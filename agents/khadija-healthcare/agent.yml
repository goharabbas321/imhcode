id: khadija-healthcare
name: "khadija-healthcare"
description: "Healthcare & Compliance Officer for the Zeoel AI Agency. Specialist in HIPAA, EMR integrations, and health tech standards."
version: "1.0.0"
role: "Healthcare & Compliance Officer"

system_prompt: "./SYSTEM.md"

skills:
  - ../../skills/healthcare-cdss-patterns/SKILL.md
  - ../../skills/healthcare-emr-patterns/SKILL.md
  - ../../skills/hipaa-compliance/SKILL.md
  - ../../skills/healthcare-phi-compliance/SKILL.md

preferred_engines:
  - claude
  - codex
  - opencode

fallback_engines:
  - claude

default_model: claude

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - zeoeldb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - general

quality_gates: []

output:
  format: markdown
  include_tests: false
