id: tester
name: "Tester"
description: "write comprehensive test suites including unit tests, integration tests, E2E browser tests, and accessibility audits."
version: "1.0.0"
role: "QA Engineer & Testing Specialist"

system_prompt: "./SYSTEM.md"

# Core skills are ALWAYS loaded (keep lean — 3-6 skills max)
# Extended skills are loaded on-demand by task keyword matching
skills:
  - ../../skills/e2e-testing/SKILL.md
  - ../../skills/webapp-testing/SKILL.md
  - ../../skills/test-driven-development/SKILL.md
  - ../../skills/tdd-workflow/SKILL.md

preferred_engines:
  - codex
  - claude
  - opencode

fallback_engines:
  - claude

default_model: gpt-5.5

permissions:
  read_files: true
  write_files: true
  run_commands: true
  network_access: false

memory:
  scopes:
    - imhdb
    - session
  readable:
    - PROJECT_BRIEF.md
    - docs/**/*.md
    - frontend/**
    - backend/**
  writable:
    - docs/**/*.md
    - frontend/**
    - backend/**

supported_task_types:
  - unit_test
  - integration_test
  - e2e_test
  - accessibility
  - performance

quality_gates: []

output:
  format: markdown
  include_tests: false
